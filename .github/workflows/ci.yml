name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Go
    uses: actions/setup-go@v5
    with:
      go-version: '1.22'

  - name: Install dependencies
    run: go mod download

  - name: Run linter
    run: go vet ./... 

  - name: Run tests
    run: go test ./...

  - name: Build project
    run: go build ./...
  